# ─── ysbtest.mugla.bel.tr (Ana Portal) ───────────────────────────────────────

server {
    listen 80;
    server_name ysbtest.mugla.bel.tr 10.5.1.180;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ysbtest.mugla.bel.tr 10.5.1.180;

    ssl_certificate     /etc/ssl/certs/mugla-bel-tr-wildcard-fullchain.pem;
    ssl_certificate_key /etc/ssl/private/mugla-bel-tr-wildcard.key;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/belediye-portal/frontend/dist;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
        client_max_body_size 20M;
    }

    location /muhtar-foto/ {
        proxy_pass http://127.0.0.1:3001/muhtar-foto/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tutanaklar/ {
        proxy_pass http://127.0.0.1:3001/tutanaklar/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}

