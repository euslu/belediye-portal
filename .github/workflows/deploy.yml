name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        run: npm ci --prefix backend
      - name: Run smoke tests
        run: npm test --prefix backend
        env:
          NODE_ENV: test

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: npm ci --prefix frontend && npm run build --prefix frontend
      - name: Copy frontend dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          source: "frontend/dist/"
          target: "/var/www/belediye-portal/frontend/"
          strip_components: 1
      - name: Deploy backend & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          script: |
            set -e
            cd /var/www/belediye-portal
            git pull origin main
            npm ci --prefix backend --omit=dev
            pm2 restart belediye-backend
            sleep 3
            curl -sf http://127.0.0.1:3001/health | python3 -c \
              "import sys,json; d=json.load(sys.stdin); \
               assert d['status']=='ok', f'Health fail: {d}'; \
               print('Deploy OK —', d)"
